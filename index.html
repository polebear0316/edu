<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 무지개 테트리스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 시작 메뉴 오버레이 -->
        <div id="start-menu" class="overlay">
            <div class="menu-content">
                <h1>심플 무지개 테트리스</h1>
                <div class="instructions">
                    <p><strong>[조작 방법]</strong></p>
                    <ul>
                        <li><strong>← / →</strong> : 좌우 이동</li>
                        <li><strong>↑ / Rotate</strong> : 블록 회전</li>
                        <li><strong>↓ / Down</strong> : 한 칸 아래로</li>
                        <li><strong>Space / Drop</strong> : 즉시 하강</li>
                    </ul>
                </div>
                <button id="btn-start" class="btn btn-primary btn-large">게임 시작 (Start)</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="board-container">
                <canvas id="game-board" width="300" height="600"></canvas>
            </div>
            <div class="side-panel">
                <div class="next-block-container">
                    <h3>NEXT</h3>
                    <canvas id="next-block" width="120" height="120"></canvas>
                </div>
                <div class="score-container">
                    <h3>SCORE</h3>
                    <div id="score">0</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="control-row">
                <button id="btn-rotate" class="btn">회전 (Rotate)</button>
                <button id="btn-drop" class="btn btn-primary">확정 (Drop)</button>
            </div>
            <div class="control-row">
                <button id="btn-left" class="btn">좌 (Left)</button>
                <button id="btn-down" class="btn">하 (Down)</button>
                <button id="btn-right" class="btn">우 (Right)</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
